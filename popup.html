<style>
  /* 1. ANIMASI BOX GLOW BERDENYUT (Efek Neon Mulus) */
  .modal-box {
    box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
    animation: glowPulse 3s infinite ease-in-out;
    border: 1px solid rgba(102, 252, 241, 0.2) !important;
  }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 15px rgba(102, 252, 241, 0.3); transform: scale(1); }
    50% { box-shadow: 0 0 35px rgba(0, 255, 255, 0.6); transform: scale(1.01); }
  }

  /* 2. TOMBOL PELANGI + BERKEDIP + MENGKILAP */
  .btn-rainbow-glow {
    background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
    background-size: 400%;
    color: #ffffff !important;
    font-size: 0.85rem !important;
    font-weight: bold !important;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    border: none !important;
    position: relative;
    overflow: hidden;
    animation: rainbowShift 8s linear infinite, blinky 2s infinite alternate;
    box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
    padding: 14px 10px !important;
  }

  @keyframes rainbowShift { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
  @keyframes blinky { 0% { filter: brightness(0.95); } 100% { filter: brightness(1.2); } }

  .btn-rainbow-glow::after {
    content: '';
    position: absolute;
    top: -50%; left: -100%;
    width: 50%; height: 200%;
    background: rgba(255, 255, 255, 0.4);
    transform: rotate(30deg);
    animation: shineEffect 4s infinite;
  }

  @keyframes shineEffect { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }
  .btn-rainbow-glow:hover { transform: translateY(-2px); }
</style>

<div class="modal-box">
  <div class="modal-header">
    <div class="modal-title-area">
      <p>✨ Welcome to My World</p>
      <h2>Selamat Datang di <span class="highlight-neon">All Animation Studio</span> 🎬</h2>
    </div>
  </div>

  <div class="modal-body-content" style="margin-bottom: 20px; color: #c5c6c7; font-size: 0.9rem; line-height: 1.5;">
    <p>Tempat nongkrongnya para pecinta animasi. Di sini lu bisa liat berbagai project seru, blog artikel menarik, dan update terbaru langsung dari gua!</p>
  </div>

  <div class="modal-action-buttons">
    <button class="btn-thanks-top btn-rainbow-glow" id="closeBtnTop">👍 Okeh, Terima Kasih!</button>
    <button class="btn-maybe-bottom" id="closeBtnBottom">🚶‍♂️ Mungkin lain kali</button>
  </div>
</div>
